<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suivi Chantiers</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow-sm no-print">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold" href="#" onclick="navigate('dashboard')">
        <i class="bi bi-building-fill-gear me-2"></i>Suivi Chantiers
      </a>
      <div class="d-flex align-items-center gap-2 ms-auto">
        <button class="btn btn-outline-light btn-sm" onclick="navigate('planning')">
          <i class="bi bi-calendar3 me-1"></i>Planning
        </button>
        <label class="btn btn-outline-light btn-sm mb-0" title="Importer un fichier Excel">
          <i class="bi bi-upload me-1"></i>Importer
          <input type="file" id="import-input" accept=".xlsx" style="display:none" onchange="importExcel(this)">
        </label>
        <a class="btn btn-outline-light btn-sm" href="/api/export">
          <i class="bi bi-download me-1"></i>Exporter
        </a>
        <div class="vr bg-white opacity-25 mx-1"></div>
        <!-- Bouton Admin (visible uniquement si admin) -->
        <a id="btn-admin" href="/admin" class="btn btn-warning btn-sm d-none">
          <i class="bi bi-shield-fill me-1"></i>Admin
        </a>
        <span class="text-white small opacity-75" id="nav-username"></span>
        <button class="btn btn-outline-light btn-sm" onclick="logoutApp()">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <main class="main-content container-fluid px-4 py-4">
    <div id="app-root">
      <div class="d-flex justify-content-center align-items-center" style="height:60vh">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    </div>
  </main>

  <!-- Toast container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3 no-print" id="toast-container" style="z-index:9999"></div>

  <!-- Modal container -->
  <div id="modal-container"></div>

  <!-- Print header (only visible when printing) -->
  <div id="print-header" class="print-header">
    <table>
      <tr>
        <td id="print-logo-area"></td>
        <td style="text-align:right">
          <div class="print-title">PLANNING DES CHANTIERS</div>
          <div id="print-date"></div>
        </td>
      </tr>
    </table>
    <div id="print-legend"></div>
    <hr>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
