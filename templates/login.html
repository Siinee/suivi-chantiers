<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Suivi Chantiers</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #2563eb 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      width: 100%; max-width: 420px;
      background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: #fff; padding: 2rem; text-align: center;
    }
    .login-header i { font-size: 2.5rem; opacity: .9; }
    .login-body { padding: 2rem; }
    .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 .2rem rgba(37,99,235,.25); }
    .btn-login {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      border: none; color: #fff; padding: .75rem;
      font-weight: 600; border-radius: 8px; width: 100%;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .9; color: #fff; }
    .alert { border-radius: 8px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <i class="bi bi-building-fill-gear d-block mb-2"></i>
      <h4 class="fw-bold mb-0">Suivi Chantiers</h4>
      <small class="opacity-75">Connectez-vous pour accéder à l'application</small>
    </div>
    <div class="login-body">
      <div id="error-msg" class="alert alert-danger d-none" role="alert"></div>
      <form id="login-form">
        <div class="mb-3">
          <label class="form-label fw-semibold">Nom d'utilisateur</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="username"
                   placeholder="admin" autocomplete="username" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Mot de passe</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password"
                   placeholder="••••••••" autocomplete="current-password" required>
            <button class="btn btn-outline-secondary" type="button"
                    onclick="togglePwd()" tabindex="-1">
              <i class="bi bi-eye" id="pwd-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-login" id="btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
        </button>
      </form>
      <p class="text-center text-muted small mt-3 mb-0">
        Compte admin par défaut : <code>admin</code> / <code>Admin1234!</code>
      </p>
    </div>
  </div>

  <script>
    function togglePwd() {
      const i = document.getElementById('password');
      const e = document.getElementById('pwd-eye');
      if (i.type === 'password') { i.type = 'text';     e.className = 'bi bi-eye-slash'; }
      else                       { i.type = 'password'; e.className = 'bi bi-eye'; }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Connexion…';

      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        })
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = data.role === 'admin' ? '/' : '/';
      } else {
        const err = document.getElementById('error-msg');
        err.textContent = data.error || 'Erreur de connexion';
        err.classList.remove('d-none');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Se connecter';
      }
    });
  </script>
</body>
</html>
