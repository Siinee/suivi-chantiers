version: '3.8'

services:

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://suivi:suivi@db:5432/suivi_chantiers
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       suivi_chantiers
      POSTGRES_USER:     suivi
      POSTGRES_PASSWORD: suivi
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suivi -d suivi_chantiers"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pg_data:
